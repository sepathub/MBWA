<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan MBWA SK Simpang Empat</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (untuk JSX) -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    
    <!-- Font Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* Menggunakan font Poppins */
        body { font-family: 'Poppins', sans-serif; }
        
        /* Animasi Masuk */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-enter { animation: fadeIn 0.6s ease-out forwards; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slideUp { animation: slideUp 0.7s ease-out forwards; }
        
        /* Animasi Loading Ceria */
        .animate-spin-slow { animation: spin 2s linear infinite; }
        .rainbow-text {
            background-image: linear-gradient(to right, #db2777, #7c3aed, #2563eb, #059669, #ea580c);
            -webkit-background-clip: text;
            color: transparent;
            background-size: 200% auto;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* Tema Cerah Sekolah - Corak Latar Belakang */
        .school-pattern {
            background-color: #f0f9ff; /* sky-50 */
            background-image: radial-gradient(#bae6fd 1.5px, transparent 1.5px); /* sky-200 */
            background-size: 24px 24px;
        }
        
        /* Tema Gelap - Corak Latar Belakang */
        .dark-pattern {
            background-color: #0f172a; /* slate-900 */
            background-image: radial-gradient(#334155 1.5px, transparent 1.5px); /* slate-700 */
            background-size: 24px 24px;
        }

        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white !important; background-image: none !important; }
            .no-break { break-inside: avoid; }
            .print-hidden { display: none !important; }
            .print-bg-white { background-color: white !important; }
            .print-text-black { color: black !important; }
            .print-border-black { border-color: black !important; }
            @page { margin: 0.5cm; }
        }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        // --- SETUP ---
        const { useState, useEffect, useMemo, useRef, Component } = React;

        // --- ERROR BOUNDARY ---
        class ErrorBoundary extends Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen flex items-center justify-center bg-slate-100 p-6">
                            <div className="bg-white p-8 rounded-2xl shadow-xl max-w-lg text-center border-t-4 border-red-500">
                                <h1 className="text-2xl font-bold text-red-600 mb-4">Ralat Sistem Dikesan</h1>
                                <p className="text-slate-600 mb-4 text-sm">Sistem gagal dimuatkan. Sila semak ralat di bawah atau pastikan sambungan internet anda stabil.</p>
                                <div className="bg-slate-100 p-4 rounded-lg text-left text-xs text-red-800 font-mono overflow-auto">
                                    {this.state.error.toString()}
                                </div>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // --- GRADIENT DEFINITIONS (Untuk Ikon) ---
        const GradientDefs = () => (
            <svg width="0" height="0" className="absolute print:hidden">
                <defs>
                    <linearGradient id="grad-hijau" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#34d399" /><stop offset="100%" stopColor="#059669" /></linearGradient>
                    <linearGradient id="grad-biru" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#60a5fa" /><stop offset="100%" stopColor="#2563eb" /></linearGradient>
                    <linearGradient id="grad-jingga" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#fb923c" /><stop offset="100%" stopColor="#ea580c" /></linearGradient>
                    <linearGradient id="grad-ungu" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#a78bfa" /><stop offset="100%" stopColor="#7c3aed" /></linearGradient>
                    <linearGradient id="grad-pink" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#f472b6" /><stop offset="100%" stopColor="#db2777" /></linearGradient>
                </defs>
            </svg>
        );

        // --- ICONS ---
        const Icon = ({ children, size = 24, className = "", stroke = "currentColor" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={stroke} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );

        const Printer = (props) => <Icon {...props}><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></Icon>;
        const Save = (props) => <Icon {...props}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></Icon>;
        const RefreshCw = (props) => <Icon {...props}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></Icon>;
        const FileText = (props) => <Icon {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></Icon>;
        const School = (props) => <Icon {...props}><path d="m4 6 8-4 8 4"/><path d="m18 10 4 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-8l4-2"/><path d="M14 22v-4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v4"/><path d="M18 5v17"/><path d="M6 5v17"/><circle cx="12" cy="9" r="2"/></Icon>;
        const User = (props) => <Icon {...props}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></Icon>;
        const MapPin = (props) => <Icon {...props}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Icon>;
        const Calendar = (props) => <Icon {...props}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></Icon>;
        const Clock = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
        const Briefcase = (props) => <Icon {...props}><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></Icon>;
        const Smile = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" x2="9.01" y1="9" y2="9"/><line x1="15" x2="15.01" y1="9" y2="9"/></Icon>;
        const CheckCircle = (props) => <Icon {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></Icon>;
        const Award = (props) => <Icon {...props}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></Icon>;
        const LayoutGrid = (props) => <Icon {...props}><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></Icon>;
        const Sun = (props) => <Icon {...props}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></Icon>;
        const Moon = (props) => <Icon {...props}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></Icon>;
        const Globe = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></Icon>;
        const XCircle = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></Icon>;
        const MessageSquare = (props) => <Icon {...props}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></Icon>;
        const Loader2 = (props) => <Icon {...props} className={`${props.className} animate-spin`}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></Icon>;
        const LayoutList = (props) => <Icon {...props}><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/><path d="M14 4h7"/><path d="M14 9h7"/><path d="M14 15h7"/><path d="M14 20h7"/></Icon>;
        const PenTool = (props) => <Icon {...props}><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="m2 2 7.586 7.586"/><circle cx="11" cy="11" r="2"/></Icon>;
        const Eye = (props) => <Icon {...props}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></Icon>;
        const Trash2 = (props) => <Icon {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></Icon>;
        const BookOpen = (props) => <Icon {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>;
        const Star = (props) => <Icon {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></Icon>;

        // --- GOOGLE APPS SCRIPT CONFIGURATION ---
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwBCa8fe0qK28SZa3vPBvY7K2L_gBb3IWxTfVsL8sYhcicO7TSTOFufMVZKPLfkdr9OYA/exec';
        
        // --- DATA & CONSTANTS ---
        const TRANSLATIONS = {
            bm: {
                title: "Laporan MBWA",
                schoolName: "SK Simpang Empat",
                adminInfo: "Maklumat Pentadbir & Logistik",
                name: "Nama Pentadbir",
                position: "Jawatan",
                date: "Tarikh",
                time: "Masa",
                location: "Lokasi Pemantauan",
                sectionA: "Bahagian A: Skor Pemantauan",
                scoreTitle: "Skor (1-5)",
                totalScore: "Jumlah Mata",
                overall: "Pencapaian Keseluruhan",
                comments: "Bahagian B : Hal-Hal Lain",
                commentPlaceholder: "Contoh: Persekitaran kantin bersih tetapi...",
                adminSign: "Nama Pentadbir",
                witnessSign: "Tandatangan Guru Bertugas / Saksi",
                reset: "Reset",
                save: "Simpan",
                print: "Cetak / PDF",
                footer: "Pendidikan Berkualiti Insan Terdidik Negara Sejahtera",
                validationName: "Sila masukkan Nama Pentadbir sebelum menyimpan.",
                saveSuccess: "Laporan berjaya disimpan ke pangkalan data!",
                saveError: "Gagal menyimpan laporan. Sila cuba lagi.",
                dbLoading: "Sedang menyambung ke pangkalan data...",
                resetConfirm: "Adakah anda pasti? Semua data akan dipadam.",
                deleteConfirm: "Adakah anda pasti mahu memadam laporan ini?",
                deleteSuccess: "Laporan berjaya dipadam.",
                deleteError: "Gagal memadam laporan.",
                aspectNote: "Catatan / Ulasan",
                aspectNotePlaceholder: "Ulasan ringkas untuk aspek ini...",
                aspects: {
                    kebersihan: "Kebersihan Fizikal",
                    disiplin: "Disiplin Murid",
                    keselamatan: "Keselamatan & Infrastruktur",
                    pengurusan: "Pengurusan Bilik/Ruang",
                    keceriaan: "Keceriaan Persekitaran"
                }
            },
            en: {
                title: "MBWA Report",
                schoolName: "SK Simpang Empat",
                adminInfo: "Administrator Info & Logistics",
                name: "Administrator Name",
                position: "Position",
                date: "Date",
                time: "Time",
                location: "Observation Location",
                sectionA: "Section A: Observation Score",
                scoreTitle: "Score (1-5)",
                totalScore: "Total Points",
                overall: "Overall Achievement",
                comments: "Section B : Other Matters",
                commentPlaceholder: "Example: Canteen environment is clean but...",
                adminSign: "Administrator Name",
                witnessSign: "Duty Teacher / Witness Signature",
                reset: "Reset",
                save: "Save",
                print: "Print / PDF",
                footer: "Quality Education, Educated People, Prosperous Nation",
                validationName: "Please enter Administrator Name before saving.",
                saveSuccess: "Report saved to database successfully!",
                saveError: "Failed to save report. Please try again.",
                dbLoading: "Connecting to database...",
                resetConfirm: "Are you sure? All data will be cleared.",
                deleteConfirm: "Are you sure you want to delete this report?",
                deleteSuccess: "Report deleted successfully.",
                deleteError: "Failed to delete report.",
                aspectNote: "Notes / Comments",
                aspectNotePlaceholder: "Brief comments for this aspect...",
                aspects: {
                    kebersihan: "Physical Cleanliness",
                    disiplin: "Student Discipline",
                    keselamatan: "Safety & Infrastructure",
                    pengurusan: "Room/Space Management",
                    keceriaan: "Environment Cheerfulness"
                }
            }
        };

        // Menggunakan Gradient SVG & Latar Belakang Khas
        const ASPEK_PENILAIAN = [
            { id: 'kebersihan', icon: <RefreshCw size={24} stroke="url(#grad-hijau)" />, bgLight: 'bg-emerald-50', bgDark: 'bg-emerald-900/30' },
            { id: 'disiplin', icon: <User size={24} stroke="url(#grad-biru)" />, bgLight: 'bg-blue-50', bgDark: 'bg-blue-900/30' },
            { id: 'keselamatan', icon: <CheckCircle size={24} stroke="url(#grad-jingga)" />, bgLight: 'bg-orange-50', bgDark: 'bg-orange-900/30' },
            { id: 'pengurusan', icon: <Briefcase size={24} stroke="url(#grad-ungu)" />, bgLight: 'bg-purple-50', bgDark: 'bg-purple-900/30' },
            { id: 'keceriaan', icon: <Smile size={24} stroke="url(#grad-pink)" />, bgLight: 'bg-pink-50', bgDark: 'bg-pink-900/30' }
        ];

        const ADMIN_LIST = [
            "ANUAR BIN ISMAIL",
            "ROSNIZAN BINTI ABD RANI",
            "HANIZA BINTI SEDIN",
            "MUHAMMAD DANIAL BIN JAMALUDIN",
            "SUZANA BINTI SULAIMAN"
        ];

        const LOCATION_LIST = ["Kelas", "Bilik Khas", "Kawasan Lain", "Tandas"];

        // --- COMPONENTS ---

        const CheerfulLoader = () => (
            <div className="flex flex-col items-center justify-center py-12 gap-4 animate-enter print:hidden">
                <Star size={48} stroke="url(#grad-pink)" fill="url(#grad-jingga)" className="animate-spin-slow drop-shadow-md" />
                <p className="font-bold text-sm md:text-base rainbow-text animate-pulse drop-shadow-sm">Sedang memuatkan laporan 📚...</p>
            </div>
        );

        const Toast = ({ message, type = 'success', isVisible, onClose }) => {
            if (!isVisible) return null;
            const isError = type === 'error';
            return (
                <div className="fixed top-5 right-5 z-50 animate-bounce-in print:hidden">
                    <div className={`border-l-4 ${isError ? 'border-red-500' : 'border-green-500'} bg-white text-slate-700 px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3`}>
                        {isError ? <XCircle className="text-red-500" size={24} /> : <CheckCircle className="text-green-500" size={24} />}
                        <div>
                            <h4 className="font-bold text-sm">{isError ? 'Ralat' : 'Berjaya!'}</h4>
                            <p className="text-xs text-slate-500">{message}</p>
                        </div>
                        <button onClick={onClose} className="ml-4 text-slate-400 hover:text-slate-600 font-bold" title="Tutup Notifikasi">✕</button>
                    </div>
                </div>
            );
        };

        const HeaderSection = ({ t, isDarkMode }) => (
            <div className="bg-gradient-to-r from-sky-500 via-teal-400 to-lime-400 text-white p-6 relative overflow-hidden print:bg-white print:text-black print:border-b print:border-slate-300 print:p-0 print:pb-4 print:mb-6">
                {/* Latar Belakang SVG Pendidikan - Penjuru Kanan Atas */}
                <div className="absolute top-[-20px] right-[-10px] opacity-20 print:hidden pointer-events-none transform rotate-12">
                    <BookOpen size={180} />
                </div>
                {/* Latar Belakang SVG Maskot Sekolah - Penjuru Kiri Atas */}
                <div className="absolute bottom-[-30px] left-[10%] opacity-15 print:hidden pointer-events-none transform -rotate-12">
                    <School size={140} />
                </div>
                
                {/* Tukar susunan dalam mod cetak supaya Logo di Kanan */}
                <div className="flex items-center gap-6 relative z-10 print:flex-row-reverse print:justify-between print:items-end">
                    <div className={`p-3 rounded-2xl text-teal-700 shadow-lg print:border print:border-slate-300 print:shadow-none print:p-2 print:rounded-full ${isDarkMode ? 'bg-slate-200' : 'bg-white/95'}`}>
                        <img 
                            src="https://i.postimg.cc/V6LnHkFk/LOGO_SKSE_utk_background_putih_(2).jpg" 
                            alt="Logo Sekolah" 
                            className="w-16 h-16 object-contain print:w-20 print:h-20"
                        />
                    </div>
                    <div className="flex-1 print:text-left">
                        <h1 className="text-3xl font-extrabold uppercase tracking-wider drop-shadow-sm print:text-2xl print:text-black">{t.schoolName}</h1>
                        <p className="text-teal-50 text-sm font-medium print:text-slate-600 mt-1 print:text-xs">Kod Sekolah: MBA0022 | Tel: 06-552 8803</p>
                        <div className="mt-3 inline-flex items-center gap-2 bg-yellow-400 text-teal-900 px-3 py-1 rounded-full text-sm font-bold shadow-sm print:bg-transparent print:text-slate-700 print:p-0 print:shadow-none print:mt-1 uppercase print:px-0">
                            <Award size={14} className="print:hidden"/> {t.title}
                        </div>
                    </div>
                </div>
            </div>
        );

        const AdminInfoForm = ({ formData, updateField, t, isDarkMode }) => (
            <section className={`animate-slideUp p-6 rounded-2xl border shadow-sm transition-all print:border-none print:shadow-none print:p-0 ${isDarkMode ? 'bg-slate-700/50 border-slate-600' : 'bg-blue-50/60 border-blue-100'}`}>
                <h3 className={`text-lg font-bold mb-6 flex items-center gap-2 border-b pb-2 print:border-none print:mb-2 print:text-black ${isDarkMode ? 'text-blue-300 border-slate-600' : 'text-blue-800 border-blue-200'}`}>
                    <span className={`p-1.5 rounded-lg print:hidden ${isDarkMode ? 'bg-slate-600 text-blue-300' : 'bg-blue-100 text-blue-600'}`}><User size={18} /></span>
                    {t.adminInfo}
                </h3>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 print:gap-4 print:text-sm">
                    <div className="space-y-2">
                        <label className={`text-xs font-bold uppercase tracking-wider flex items-center gap-2 print:text-black ${isDarkMode ? 'text-blue-300' : 'text-blue-600'}`}>
                            <User size={14} className="print:hidden"/> {t.name}
                        </label>
                        <div className="relative">
                            <select 
                                name="namaPentadbir" 
                                value={formData.namaPentadbir}
                                onChange={(e) => updateField('namaPentadbir', e.target.value)}
                                title="Sila pilih nama pentadbir yang menjalankan pemantauan"
                                className={`w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-400 appearance-none print:border-none print:p-0 print:font-bold print:bg-transparent cursor-pointer ${isDarkMode ? 'bg-slate-800 border-slate-600 text-white hover:bg-slate-700' : 'bg-white border-blue-200 hover:bg-blue-50'}`}
                            >
                                <option value="">Sila Pilih Nama...</option>
                                {ADMIN_LIST.map((name) => (
                                    <option key={name} value={name}>{name}</option>
                                ))}
                            </select>
                        </div>
                    </div>

                    <div className="space-y-2">
                        <label className={`text-xs font-bold uppercase tracking-wider flex items-center gap-2 print:text-black ${isDarkMode ? 'text-blue-300' : 'text-blue-600'}`}>
                            <Briefcase size={14} className="print:hidden"/> {t.position}
                        </label>
                        <div className="relative">
                            <select 
                                name="jawatan" value={formData.jawatan}
                                onChange={(e) => updateField('jawatan', e.target.value)}
                                title="Pilih jawatan pentadbir"
                                className={`w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-400 appearance-none print:border-none print:p-0 print:font-bold print:bg-transparent cursor-pointer ${isDarkMode ? 'bg-slate-800 border-slate-600 text-white hover:bg-slate-700' : 'bg-white border-blue-200 hover:bg-blue-50'}`}
                            >
                                <option value="">Sila Pilih Jawatan...</option>
                                <option value="Guru Besar">Guru Besar</option>

        const ScoreTable = ({ formData, updateScore, updateAspectComment, t, isDarkMode, calculations }) => {

                if (percent >= 80) return 'bg-green-500';
                if (percent >= 50) return 'bg-yellow-400';
                return 'bg-red-400';

            // Logik Progress Badge
            const getBadge = (percent) => {
                if (percent >= 90) return { text: 'Cemerlang', color: 'bg-green-100 text-green-700 border-green-200 dark:bg-green-900/50 dark:text-green-300' };
                if (percent >= 80) return { text: 'Baik', color: 'bg-blue-100 text-blue-700 border-blue-200 dark:bg-blue-900/50 dark:text-blue-300' };
                if (percent >= 50) return { text: 'Memuaskan', color: 'bg-yellow-100 text-yellow-700 border-yellow-200 dark:bg-yellow-900/50 dark:text-yellow-300' };
                return { text: 'Perlu Perhatian', color: 'bg-red-100 text-red-700 border-red-200 dark:bg-red-900/50 dark:text-red-300' };

            return (

                                        />
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    <div className={`mt-6 pt-4 border-t flex justify-between items-center print:mt-2 print:pt-2 print:border-slate-300 ${isDarkMode ? 'border-slate-600' : 'border-indigo-200'}`}>
                        <span className={`font-bold uppercase text-sm print:text-black ${isDarkMode ? 'text-indigo-300' : 'text-indigo-900'}`}>{t.totalScore}</span>
                        <span className={`font-bold text-lg print:text-black ${isDarkMode ? 'text-indigo-300' : 'text-indigo-900'}`}>{totalScore} / {maxScore}</span>
                    </div>
                </section>
            );
        };

        const CommentsSection = ({ formData, updateField, t, isDarkMode }) => (
            <section className={`animate-slideUp p-6 rounded-2xl border shadow-sm transition-all print:border-none print:shadow-none print:p-0 ${isDarkMode ? 'bg-slate-700/50 border-slate-600' : 'bg-green-50/60 border-green-100'}`} style={{animationDelay: "0.2s"}}>
                <h3 className={`text-lg font-bold mb-4 flex items-center gap-2 border-b pb-2 print:border-none print:mb-2 print:text-black ${isDarkMode ? 'text-green-300 border-slate-600' : 'text-green-800 border-green-200'}`}>
                    <span className={`p-1.5 rounded-lg print:hidden ${isDarkMode ? 'bg-slate-600 text-green-300' : 'bg-green-100 text-green-600'}`}><FileText size={18} /></span>

                </h3>
                <div className={`p-1 rounded-xl border shadow-inner print:border-black print:p-0 print:shadow-none focus-within:ring-2 focus-within:ring-green-400 transition-shadow ${isDarkMode ? 'bg-slate-800 border-slate-600' : 'bg-white border-green-200'}`}>
                    <textarea
                        name="ulasan" value={formData.ulasan}
                        onChange={(e) => updateField('ulasan', e.target.value)}

                        title="Ulasan keseluruhan atau perkara berbangkit"
                        className={`w-full p-4 rounded-lg focus:ring-0 focus:outline-none resize-none leading-relaxed bg-transparent print:text-sm print:h-32 ${isDarkMode ? 'text-slate-100 placeholder-slate-500' : 'text-slate-700 placeholder-slate-400'}`}
                    ></textarea>
                </div>
                <div className="flex justify-end mt-2 print:hidden">
                    <span className={`text-xs font-semibold ${formData.ulasan.length > 450 ? 'text-red-500' : 'text-slate-400'}`}>{formData.ulasan.length} / 500</span>
                </div>
            </section>
        );

        const FooterSection = ({ formData, actions, t, isDarkMode }) => (
            <React.Fragment>
                <div className="hidden print:flex justify-center items-end mt-12 pt-8 no-break">
                    <div className="text-center w-1/2">
                        <div className="mb-2">
                            <p className="font-bold text-sm">{t.adminSign}</p>
                        </div>
                        <div className="h-16"></div> {/* Spacer for signature */}
                        <p className="text-sm font-bold uppercase border-t border-black inline-block px-8 pt-1">({formData.namaPentadbir || '____________________'})</p>
                        <p className="text-xs mt-1">{formData.jawatan}</p>
                        <p className="text-xs mt-1">{t.date}: {new Date(formData.tarikh).toLocaleDateString('ms-MY')}</p>
                    </div>
                </div>
                
                <div className="hidden print:block text-center mt-12 pt-4 border-t border-slate-300">
                    <p className="text-xs font-serif italic text-slate-500">"{t.footer}"</p>
                </div>
            </React.Fragment>
        );

        const ActionButtons = ({ actions, t, isDarkMode, isSaving }) => (
            <div className={`animate-slideUp p-6 flex flex-wrap justify-end gap-3 border-t print:hidden ${isDarkMode ? 'bg-slate-700 border-slate-600' : 'bg-gray-50 border-gray-100'}`} style={{animationDelay: "0.3s"}}>
                <button onClick={actions.handleReset} title="Kosongkan semula borang" className={`flex items-center gap-2 px-5 py-2.5 rounded-xl transition-transform duration-300 hover:scale-105 hover:shadow-xl active:scale-95 font-semibold ${isDarkMode ? 'bg-slate-600 text-slate-200 hover:bg-slate-500' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'}`}>
                    <RefreshCw size={18} /> {t.reset}
                </button>
                <button 
                    onClick={actions.handleSave} 
                    disabled={isSaving}
                    title="Simpan laporan ke dalam Pangkalan Data (Google Sheets)"
                    className={`flex items-center gap-2 px-5 py-2.5 text-white rounded-xl shadow-lg transition-transform duration-300 active:scale-95 font-semibold ${isSaving ? 'bg-green-400 cursor-not-allowed' : 'bg-green-500 hover:bg-green-600 hover:scale-105 hover:shadow-xl'}`}
                >
                    {isSaving ? <Loader2 size={18} className="animate-spin" /> : <Save size={18} />} 
                    {isSaving ? 'Menyimpan...' : t.save}
                </button>
                <button 
                    onClick={() => window.print()} 
                    title="Cetak format rasmi atau simpan sebagai PDF"
                    className="flex items-center gap-2 px-6 py-2.5 text-white bg-gradient-to-r from-blue-700 to-blue-500 rounded-xl hover:from-blue-800 hover:to-blue-600 hover:shadow-xl hover:scale-105 transition-transform duration-300 font-semibold active:scale-95"
                >
                    <Printer size={18} /> {t.print}
                </button>
            </div>
        );

        // --- NEW REPORT LIST TAB COMPONENT ---
        const ReportListComponent = ({ onSelectReport, t, isDarkMode, onShowToast }) => {
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [reports, setReports] = useState([]);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                fetchReports();
            }, [selectedDate]);

            const fetchReports = async () => {
                setLoading(true);
                try {
                    const response = await fetch(`${GAS_URL}?action=fetch&tarikh=${selectedDate}`);
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        setReports(result.data || []);
                    } else {
                        console.error("Error fetching reports:", result.message);
                        setReports([]);
                    }
                } catch (error) {
                    console.error("Fetch error:", error);
                    setReports([]);
                }
                setLoading(false);
            };

            const handleDelete = async (id) => {
                if (!window.confirm(t.deleteConfirm || "Adakah anda pasti mahu memadam laporan ini?")) return;
                
                try {
                    const response = await fetch(`${GAS_URL}?action=delete&id=${encodeURIComponent(id)}`);
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        if (onShowToast) onShowToast(t.deleteSuccess || "Laporan berjaya dipadam.", "success");
                        fetchReports(); 
                    } else {
                        throw new Error(result.message || "Ralat tidak diketahui dari pelayan GAS.");
                    }
                } catch (error) {
                    console.error("Error deleting:", error);
                    if (onShowToast) onShowToast((t.deleteError || "Gagal memadam laporan.") + " (" + error.message + ")", "error");
                }
            };

            const mapDbToState = (dbRecord) => ({
                namaPentadbir: dbRecord.nama_pentadbir,
                jawatan: dbRecord.jawatan,
                tarikh: dbRecord.tarikh,
                masa: dbRecord.masa,
                lokasi: dbRecord.lokasi,
                lokasiCatatan: dbRecord.lokasi_catatan,
                skor: dbRecord.skor,
                catatanBahagianA: dbRecord.catatan_bahagian_a || { kebersihan: '', disiplin: '', keselamatan: '', pengurusan: '', keceriaan: '' },
                ulasan: dbRecord.ulasan
            });

            return (
                <section className={`animate-slideUp p-6 space-y-6 ${isDarkMode ? 'text-white' : 'text-slate-700'}`}>
                    <div className="flex items-center justify-between mb-4">
                        <h2 className="text-xl font-bold flex items-center gap-2">
                            <LayoutList size={24} className="text-teal-500"/> Senarai Cetakan Laporan
                        </h2>
                    </div>

                    <div className={`flex items-center gap-4 p-4 rounded-xl border shadow-sm ${isDarkMode ? 'bg-slate-800 border-slate-600' : 'bg-white border-slate-200'}`}>
                        <label className="font-semibold text-sm">Pilih Tarikh:</label>
                        <input 
                            type="date" 
                            value={selectedDate} 
                            onChange={(e) => setSelectedDate(e.target.value)}
                            title="Pilih tarikh untuk melihat laporan"
                            className={`p-2 border rounded-lg transition-colors focus:ring-2 focus:ring-teal-400 ${isDarkMode ? 'bg-slate-700 border-slate-600 text-white' : 'bg-slate-50 border-slate-300'}`}
                        />
                    </div>

                    {loading ? (
                        <CheerfulLoader />
                    ) : reports.length === 0 ? (
                        <div className="text-center py-10 opacity-50 border-2 border-dashed border-slate-300 rounded-xl">
                            <p>Tiada laporan dijumpai pada tarikh ini.</p>
                        </div>
                    ) : (
                        <div className="grid gap-4">
                            {reports.map((report) => (
                                <div key={report.id} className={`p-4 rounded-xl border flex justify-between items-center shadow-sm transition-transform duration-300 hover:scale-[1.02] hover:shadow-xl ${isDarkMode ? 'bg-slate-800 border-slate-600' : 'bg-white border-sky-100 hover:bg-sky-50'}`}>
                                    <div>
                                        <p className="font-bold text-lg">{report.nama_pentadbir}</p>
                                        <p className="text-sm opacity-70 flex items-center gap-2 mt-1">
                                            <Clock size={14}/> {report.masa} &nbsp;|&nbsp; <MapPin size={14}/> {report.lokasi}
                                        </p>
                                    </div>
                                    <div className="flex gap-2">
                                        <button 
                                            onClick={() => onSelectReport(mapDbToState(report))}
                                            title="Papar dan cetak laporan ini"
                                            className="flex items-center gap-2 px-4 py-2 bg-teal-500 text-white rounded-lg hover:bg-teal-600 shadow-sm transition-transform duration-300 hover:scale-105 font-medium text-sm"
                                        >
                                            <Eye size={16}/> Papar
                                        </button>
                                        <button 
                                            onClick={() => handleDelete(report.id)}
                                            title="Padam laporan ini dari pangkalan data"
                                            className="flex items-center gap-2 px-3 py-2 bg-red-100 text-red-600 rounded-lg hover:bg-red-200 shadow-sm transition-transform duration-300 hover:scale-105 font-medium text-sm"
                                        >
                                            <Trash2 size={16}/>
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </section>
            );
        };

        // --- NEW CALENDAR TAB COMPONENT ---
        const CalendarTabComponent = ({ onSelectReport, t, isDarkMode, onShowToast }) => {
            const [selectedMonth, setSelectedMonth] = useState(() => {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            });
            const [reports, setReports] = useState([]);
            const [loading, setLoading] = useState(false);
            const [activeDate, setActiveDate] = useState(null);

            useEffect(() => {
                fetchMonthlyReports();
            }, [selectedMonth]);

            const fetchMonthlyReports = async () => {
                setLoading(true);
                try {
                    const response = await fetch(`${GAS_URL}?action=fetch&tarikh=${selectedMonth}`);
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        setReports(result.data || []);
                        setActiveDate(null); 
                    } else {
                        console.error("Error fetching monthly reports:", result.message);
                        setReports([]);
                    }
                } catch (error) {
                    console.error("Fetch error:", error);
                    setReports([]);
                }
                setLoading(false);
            };

            const handleDelete = async (id) => {
                if (!window.confirm(t.deleteConfirm || "Adakah anda pasti mahu memadam laporan ini?")) return;
                
                try {
                    const response = await fetch(`${GAS_URL}?action=delete&id=${encodeURIComponent(id)}`);
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        if (onShowToast) onShowToast(t.deleteSuccess || "Laporan berjaya dipadam.", "success");
                        fetchMonthlyReports(); 
                    } else {
                        throw new Error(result.message || "Ralat tidak diketahui dari pelayan GAS.");
                    }
                } catch (error) {
                    console.error("Error deleting:", error);
                    if (onShowToast) onShowToast((t.deleteError || "Gagal memadam laporan.") + " (" + error.message + ")", "error");
                }
            };

            const mapDbToState = (dbRecord) => ({
                namaPentadbir: dbRecord.nama_pentadbir,
                jawatan: dbRecord.jawatan,
                tarikh: dbRecord.tarikh,
                masa: dbRecord.masa,
                lokasi: dbRecord.lokasi,
                lokasiCatatan: dbRecord.lokasi_catatan,
                skor: dbRecord.skor,
                catatanBahagianA: dbRecord.catatan_bahagian_a || { kebersihan: '', disiplin: '', keselamatan: '', pengurusan: '', keceriaan: '' },
                ulasan: dbRecord.ulasan
            });

            // Logik membina susunan hari kalendar
            const year = parseInt(selectedMonth.split('-')[0]);
            const month = parseInt(selectedMonth.split('-')[1]) - 1;
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDayOfMonth = new Date(year, month, 1).getDay();

            const days = [];
            for (let i = 0; i < firstDayOfMonth; i++) days.push(null);
            for (let i = 1; i <= daysInMonth; i++) days.push(i);

            const getFormatDate = (d) => `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            
            const handleDayClick = (d) => {
                if(!d) return;
                setActiveDate(getFormatDate(d));
            };

            const dayNames = ['Ah', 'Is', 'Se', 'Ra', 'Kh', 'Ju', 'Sa'];
            const selectedDayReports = activeDate ? reports.filter(r => r.tarikh === activeDate) : [];

            return (
                <section className={`animate-slideUp p-6 space-y-6 ${isDarkMode ? 'text-white' : 'text-slate-700'}`}>
                    <div className="flex items-center justify-between mb-4">
                        <h2 className="text-xl font-bold flex items-center gap-2">
                            <Calendar size={24} className="text-teal-500"/> Kalendar Pemantauan
                        </h2>
                    </div>

                    <div className={`flex flex-col md:flex-row items-start md:items-center gap-4 p-4 rounded-xl border shadow-sm ${isDarkMode ? 'bg-slate-800 border-slate-600' : 'bg-white border-slate-200'}`}>
                        <label className="font-semibold text-sm whitespace-nowrap">Pilih Bulan:</label>
                        <input 
                            type="month" 
                            value={selectedMonth} 
                            onChange={(e) => setSelectedMonth(e.target.value)}
                            title="Tukar paparan bulan kalendar"
                            className={`p-2 border rounded-lg w-full md:w-auto transition-colors focus:ring-2 focus:ring-teal-400 ${isDarkMode ? 'bg-slate-700 border-slate-600 text-white' : 'bg-slate-50 border-slate-300'}`}
                        />
                    </div>

                    {loading ? (
                        <div className="border rounded-xl p-8 mb-6"><CheerfulLoader /></div>
                    ) : (
                        <React.Fragment>
                            {/* Petak Kalendar */}
                            <div className={`p-4 rounded-xl border shadow-sm ${isDarkMode ? 'bg-slate-800 border-slate-600' : 'bg-white border-slate-200'}`}>
                                <div className="grid grid-cols-7 gap-1 md:gap-2 mb-2">
                                    {dayNames.map(day => (
                                        <div key={day} className={`text-center font-bold text-xs py-2 ${day === 'Ah' || day === 'Sa' ? 'text-red-500' : ''}`}>
                                            {day}
                                        </div>
                                    ))}
                                </div>
                                <div className="grid grid-cols-7 gap-1 md:gap-2">
                                    {days.map((day, idx) => {
                                        if (!day) return <div key={`empty-${idx}`} className="p-2 md:p-4"></div>;
                                        
                                        const dateStr = getFormatDate(day);
                                        const dayReports = reports.filter(r => r.tarikh === dateStr);
                                        const hasReports = dayReports.length > 0;
                                        const isSelected = activeDate === dateStr;
                                        const isToday = dateStr === new Date().toISOString().split('T')[0];

                                        return (
                                            <div 
                                                key={day}
                                                title={hasReports ? `${dayReports.length} laporan pada ${dateStr}` : "Tiada laporan"}
                                                onClick={() => handleDayClick(day)}
                                                className={`relative p-2 md:p-4 text-center rounded-lg cursor-pointer transition-all duration-300 hover:scale-105 flex flex-col items-center justify-center min-h-[50px]
                                                    ${isSelected ? (isDarkMode ? 'bg-teal-600 text-white' : 'bg-teal-500 text-white shadow-md') : 
                                                    isDarkMode ? 'hover:bg-slate-700 text-slate-200' : 'hover:bg-slate-100 text-slate-700'}
                                                    ${isToday && !isSelected ? (isDarkMode ? 'border border-teal-400' : 'border-2 border-teal-400 font-bold') : ''}
                                                `}
                                            >
                                                <span className={`${hasReports ? 'font-bold' : ''}`}>{day}</span>
                                                {hasReports && (
                                                    <div className="flex gap-1 mt-1 flex-wrap justify-center">
                                                        {dayReports.slice(0, 3).map((_, i) => (
                                                            <div key={i} className={`w-1.5 h-1.5 rounded-full ${isSelected ? 'bg-white' : 'bg-sky-400'}`}></div>
                                                        ))}
                                                        {dayReports.length > 3 && <span className="text-[10px] leading-none ml-0.5">+</span>}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </React.Fragment>
                    )}

                    {/* Senarai Laporan untuk Hari Dipilih */}
                    {activeDate && selectedDayReports.length > 0 && (
                        <div className={`animate-slideUp p-4 rounded-xl border ${isDarkMode ? 'bg-slate-800 border-slate-600' : 'bg-sky-50 border-sky-100'}`}>
                            <h3 className="font-bold mb-4 flex items-center gap-2">
                                <FileText size={18}/> Rekod Laporan: {activeDate}
                            </h3>
                            <div className="grid gap-3">
                                {selectedDayReports.map((report) => (
                                    <div key={report.id} className={`p-3 rounded-lg border flex justify-between items-center shadow-sm transition-transform duration-300 hover:scale-[1.02] hover:shadow-md ${isDarkMode ? 'bg-slate-700 border-slate-600' : 'bg-white border-sky-200'}`}>
                                        <div>
                                            <p className="font-bold">{report.nama_pentadbir}</p>
                                            <p className="text-xs opacity-70 flex items-center gap-2 mt-1">
                                                <Clock size={12}/> {report.masa} &nbsp;|&nbsp; <MapPin size={12}/> {report.lokasi}
                                            </p>
                                        </div>
                                        <div className="flex gap-2">
                                            <button 
                                                onClick={() => onSelectReport(mapDbToState(report))}
                                                title="Papar dan cetak"
                                                className="flex items-center gap-1.5 px-3 py-1.5 bg-teal-500 text-white rounded-lg hover:bg-teal-600 shadow-sm transition-transform duration-300 hover:scale-105 font-medium text-xs"
                                            >
                                                <Eye size={14}/> Papar
                                            </button>
                                            <button 
                                                onClick={() => handleDelete(report.id)}
                                                title="Padam laporan"
                                                className="flex items-center gap-1.5 px-2 py-1.5 bg-red-100 text-red-600 rounded-lg hover:bg-red-200 shadow-sm transition-transform duration-300 hover:scale-105 font-medium text-xs"
                                            >
                                                <Trash2 size={14}/>
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </section>
            );
        };

        // --- MAIN APP COMPONENT ---
        const MBWAReport = () => {
            const getInitialData = () => {
                return {
                    namaPentadbir: '',
                    jawatan: '',
                    tarikh: new Date().toISOString().split('T')[0],
                    masa: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }),
                    lokasi: '',
                    lokasiCatatan: '',
                    skor: { kebersihan: 0, disiplin: 0, keselamatan: 0, pengurusan: 0, keceriaan: 0 },
                    catatanBahagianA: { kebersihan: '', disiplin: '', keselamatan: '', pengurusan: '', keceriaan: '' },
                    ulasan: ''
                };
            };

            const [activeTab, setActiveTab] = useState('input'); 
            const [formData, setFormData] = useState(getInitialData);
            const [lang, setLang] = useState('bm');
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
            const [isSaving, setIsSaving] = useState(false);

            const t = TRANSLATIONS[lang];

            const updateField = (name, value) => {
                setFormData(prev => ({ ...prev, [name]: value }));
            };
            const updateScore = (id, value) => setFormData(prev => ({...prev, skor: {...prev.skor, [id]: parseInt(value)}}));
            const updateAspectComment = (id, value) => setFormData(prev => ({...prev, catatanBahagianA: {...prev.catatanBahagianA, [id]: value}}));
            const handleReset = () => { if(window.confirm(t.resetConfirm)) setFormData(getInitialData()); };
            
            const generateUniqueId = () => {
                if (typeof window !== 'undefined' && window.crypto && window.crypto.randomUUID) {
                    return window.crypto.randomUUID();
                }
                return Date.now().toString() + '-' + Math.random().toString(36).substr(2, 9);
            };

            const handleSave = async () => {
                if (!formData.namaPentadbir.trim()) { showToast(t.validationName, 'error'); return; }
                if (!formData.jawatan) { showToast("Sila pilih Jawatan pentadbir.", 'error'); return; }
                if (Object.values(formData.skor).includes(0)) { showToast("Sila lengkapkan skor (1-5) untuk semua aspek pemantauan.", 'error'); return; }
                
                setIsSaving(true);
                try {
                    const payload = {
                        action: 'insert',
                        data: {
                            id: generateUniqueId(),
                            nama_pentadbir: formData.namaPentadbir,
                            jawatan: formData.jawatan,
                            tarikh: formData.tarikh,
                            masa: formData.masa,
                            lokasi: formData.lokasi,
                            lokasi_catatan: formData.lokasiCatatan,
                            skor: formData.skor,
                            catatan_bahagian_a: formData.catatanBahagianA,
                            ulasan: formData.ulasan
                        }
                    };

                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                    
                    const result = await response.json();
                    if (result.status !== 'success') throw new Error(result.message);
                    
                    showToast(t.saveSuccess, 'success');
                } catch (error) { 
                    console.error('Ralat:', error); 
                    showToast(`${t.saveError} (${error.message})`, 'error'); 
                } 
                finally { setIsSaving(false); }
            };

            const showToast = (message, type = 'success') => { setToast({ show: true, message, type }); setTimeout(() => setToast(prev => ({ ...prev, show: false })), 4000); };
            const calculations = useMemo(() => {
                const totalScore = Object.values(formData.skor).reduce((a, b) => a + b, 0);
                const maxScore = ASPEK_PENILAIAN.length * 5;
                const percentage = Math.round((totalScore / maxScore) * 100);
                return { totalScore, maxScore, percentage };
            }, [formData.skor]);

            const loadReportForPrinting = (data) => {
                setFormData(data);
                setActiveTab('input'); 
                window.scrollTo({ top: 0, behavior: 'smooth' });
                showToast("Laporan dimuatkan. Sila tekan butang Cetak di bawah.", "success");
            };

            const actions = { setLang, setIsDarkMode, setToast: showToast, closeToast: () => setToast(prev => ({ ...prev, show: false })), updateField, updateScore, updateAspectComment, handleSave, handleReset };

            return (
                <React.Fragment>
                    <GradientDefs />
                    <Toast message={toast.message} type={toast.type} isVisible={toast.show} onClose={actions.closeToast} />

                    <div className={`min-h-screen p-4 md:p-8 transition-colors duration-500 ease-in-out ${isDarkMode ? 'dark-pattern text-slate-100' : 'school-pattern text-slate-700'}`}>
                        
                        <div className="fixed top-4 right-4 z-40 flex gap-2 print:hidden">
                            <button onClick={() => setLang(l => l === 'bm' ? 'en' : 'bm')} title="Tukar Bahasa" className={`p-2 rounded-full shadow-lg transition-transform duration-300 hover:scale-110 hover:shadow-xl ${isDarkMode ? 'bg-slate-800 text-white' : 'bg-white text-slate-700'}`}><Globe size={16}/></button>
                            <button onClick={() => setIsDarkMode(!isDarkMode)} title="Tukar Mod Gelap/Terang" className={`p-2 rounded-full shadow-lg transition-transform duration-300 hover:scale-110 hover:shadow-xl ${isDarkMode ? 'bg-yellow-400 text-slate-900' : 'bg-slate-700 text-white'}`}>{isDarkMode ? <Sun size={18}/> : <Moon size={18}/>}</button>
                        </div>

                        <div className={`max-w-[210mm] mx-auto shadow-2xl rounded-2xl overflow-hidden animate-enter transition-colors duration-300 print:shadow-none print:max-w-full print:rounded-none print-frame ${isDarkMode ? 'bg-slate-800' : 'bg-white'}`}>
                            
                            <HeaderSection t={t} isDarkMode={isDarkMode} />

                            <div className="flex border-b border-gray-200 print:hidden overflow-x-auto px-4 pt-2">
                                {/* Tab Aktif kini berwarna padu dan lebih menonjol */}
                                <button 
                                    onClick={() => setActiveTab('input')}
                                    className={`flex-1 min-w-[120px] py-3 rounded-t-xl font-bold text-sm flex items-center justify-center gap-1 md:gap-2 transition-all duration-300 ${activeTab === 'input' ? (isDarkMode ? 'bg-teal-600 text-white shadow-inner border-t-2 border-teal-400' : 'bg-teal-500 text-white shadow-inner border-t-2 border-teal-300') : (isDarkMode ? 'bg-slate-800 text-slate-400 hover:bg-slate-700' : 'bg-white text-slate-500 hover:bg-slate-50')}`}
                                >
                                    <PenTool size={16}/> <span className="hidden md:inline">Borang Baru / Paparan</span><span className="md:hidden">Borang</span>
                                </button>
                                <button 
                                    onClick={() => setActiveTab('list')}
                                    className={`flex-1 min-w-[120px] py-3 rounded-t-xl font-bold text-sm flex items-center justify-center gap-1 md:gap-2 transition-all duration-300 ${activeTab === 'list' ? (isDarkMode ? 'bg-teal-600 text-white shadow-inner border-t-2 border-teal-400' : 'bg-teal-500 text-white shadow-inner border-t-2 border-teal-300') : (isDarkMode ? 'bg-slate-800 text-slate-400 hover:bg-slate-700' : 'bg-white text-slate-500 hover:bg-slate-50')}`}
                                >
                                    <LayoutList size={16}/> <span className="hidden md:inline">Senarai Cetakan</span><span className="md:hidden">Senarai</span>
                                </button>
                                <button 
                                    onClick={() => setActiveTab('calendar')}
                                    className={`flex-1 min-w-[120px] py-3 rounded-t-xl font-bold text-sm flex items-center justify-center gap-1 md:gap-2 transition-all duration-300 ${activeTab === 'calendar' ? (isDarkMode ? 'bg-teal-600 text-white shadow-inner border-t-2 border-teal-400' : 'bg-teal-500 text-white shadow-inner border-t-2 border-teal-300') : (isDarkMode ? 'bg-slate-800 text-slate-400 hover:bg-slate-700' : 'bg-white text-slate-500 hover:bg-slate-50')}`}
                                >
                                    <Calendar size={16}/> Kalendar
                                </button>
                            </div>
                            
                            {activeTab === 'input' ? (
                                <React.Fragment>
                                    <div className="p-8 space-y-8 print:p-0 print:space-y-0">
                                        <AdminInfoForm formData={formData} updateField={actions.updateField} t={t} isDarkMode={isDarkMode} />
                                        <ScoreTable formData={formData} updateScore={actions.updateScore} updateAspectComment={actions.updateAspectComment} t={t} isDarkMode={isDarkMode} calculations={calculations} />
                                        <CommentsSection formData={formData} updateField={actions.updateField} t={t} isDarkMode={isDarkMode} />
                                        <FooterSection formData={formData} actions={actions} t={t} isDarkMode={isDarkMode} />
                                    </div>
                                    <ActionButtons actions={actions} t={t} isDarkMode={isDarkMode} isSaving={isSaving} />
                                </React.Fragment>
                            ) : activeTab === 'list' ? (
                                <ReportListComponent onSelectReport={loadReportForPrinting} t={t} isDarkMode={isDarkMode} onShowToast={showToast} />
                            ) : (
                                <CalendarTabComponent onSelectReport={loadReportForPrinting} t={t} isDarkMode={isDarkMode} onShowToast={showToast} />
                            )}
                        </div>
                        
                        <div className="text-center mt-8 text-teal-700 text-sm print:hidden font-medium opacity-60">Sistem Pengurusan Sekolah Digital © 2026</div>
                    </div>
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <MBWAReport />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
